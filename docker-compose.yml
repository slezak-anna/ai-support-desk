services:
  api:
    build: .
    container_name: ai_support_api
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  
  worker:
    build: .
    container_name: ai_support_worker
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: celery -A app.worker worker --loglevel=info
    
  redis:
    image: redis:latest
    container_name: ai_support_redis
    ports:
      - "6379:6379"

  db:
    image: postgres:16
    container_name: ai_support_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
volumes:
  postgres_data: